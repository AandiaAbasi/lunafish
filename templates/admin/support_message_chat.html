{% extends "admin/base_site.html" %}
{% load i18n admin_urls %}

{% block title %}مدیریت پیام‌های پشتیبانی - {{ block.super }}{% endblock %}

{% block content %}
<style>
    :root {
        --white: #ffffff;
        --light-gray: #f5f5f5;
        --gray: #e0e0e0;
        --dark-gray: #666666;
        --darker-gray: #333333;
        --light-blue: #ecf0f6;
        --blue: #3b82f6;
        --dark-blue: #1e40af;
        --success: #10b981;
        --warning: #f59e0b;
        --error: #ef4444;
    }

    body {
        direction: rtl;
    }

    #content {
        padding: 0;
    }

    .main-container {
        display: grid;
        grid-template-columns: 350px 1fr;
        gap: 0;
        height: calc(100vh - 60px);
    }

    @media (max-width: 768px) {
        .main-container {
            grid-template-columns: 1fr;
            height: auto;
        }
    }

    /* Sidebar - Teachers List */
    .sidebar {
        background-color: var(--white);
        border-left: 1px solid var(--gray);
        padding: 0;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
    }

    .sidebar-header {
        padding: 20px;
        border-bottom: 1px solid var(--gray);
        background-color: var(--light-gray);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .sidebar-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--darker-gray);
        margin: 0;
    }

    .refresh-btn {
        width: 36px;
        height: 36px;
        border: 1px solid var(--gray);
        background-color: var(--white);
        color: var(--dark-gray);
        border-radius: 6px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
    }

    .refresh-btn:hover {
        background-color: var(--light-blue);
        color: var(--blue);
    }

    .teachers-list {
        flex: 1;
        overflow-y: auto;
    }

    .teacher-item {
        padding: 16px 20px;
        border-bottom: 1px solid var(--gray);
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
    }

    .teacher-item:hover {
        background-color: var(--light-gray);
    }

    .teacher-item.active {
        background-color: var(--light-blue);
        border-left: 4px solid var(--blue);
        padding-left: 16px;
    }

    .teacher-info {
        flex: 1;
    }

    .teacher-name {
        font-weight: 600;
        color: var(--darker-gray);
        margin-bottom: 4px;
        font-size: 14px;
    }

    .teacher-meta {
        font-size: 12px;
        color: var(--dark-gray);
        opacity: 0.7;
    }

    .unread-badge {
        background-color: var(--error);
        color: var(--white);
        border-radius: 50%;
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 600;
        min-width: 24px;
    }

    .unread-badge.hidden {
        display: none;
    }

    /* Main Content */
    .main-content {
        display: flex;
        flex-direction: column;
        background-color: var(--light-gray);
        height: 100%;
    }

    .messages-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        background-color: var(--white);
    }

    .messages-header {
        padding: 20px;
        border-bottom: 1px solid var(--gray);
        background-color: var(--light-gray);
    }

    .messages-title {
        font-size: 16px;
        font-weight: 600;
        color: var(--darker-gray);
        margin: 0 0 8px 0;
    }

    .messages-subtitle {
        font-size: 13px;
        color: var(--dark-gray);
        margin: 0;
    }

    .messages-list {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
    }

    .message-row {
        padding: 12px;
        margin-bottom: 8px;
        background-color: var(--light-gray);
        border-radius: 6px;
        border-left: 4px solid transparent;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .message-row:hover {
        background-color: #f0f0f0;
    }

    .message-row.active {
        background-color: var(--light-blue);
        border-left-color: var(--blue);
    }

    .message-row.unread {
        border-left-color: var(--error);
    }

    .msg-sender {
        font-weight: 600;
        color: var(--darker-gray);
        font-size: 13px;
        margin-bottom: 4px;
    }

    .msg-text {
        font-size: 12px;
        color: var(--dark-gray);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 4px;
    }

    .msg-time {
        font-size: 11px;
        color: var(--dark-gray);
        opacity: 0.6;
    }

    .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--dark-gray);
        text-align: center;
    }

    .empty-icon {
        font-size: 48px;
        margin-bottom: 16px;
        opacity: 0.3;
    }

    /* Loading State */
    .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--dark-gray);
    }

    .spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid var(--gray);
        border-top-color: var(--blue);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-left: 10px;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* Toast */
    .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 16px;
        border-radius: 6px;
        color: var(--white);
        font-size: 14px;
        z-index: 3000;
        animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
        from {
            transform: translateX(100%);
            opacity: 0;
        }
        to {
            transform: translateX(0);
            opacity: 1;
        }
    }

    .toast-success {
        background-color: var(--success);
    }

    .toast-error {
        background-color: var(--error);
    }

    .status-unread {
        color: var(--error);
        font-weight: 600;
    }
</style>

<div class="main-container">
    <!-- Sidebar - Teachers List -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2 class="sidebar-title">{% trans "Teachers" %}</h2>
            <button class="refresh-btn" id="refreshBtn" title="{% trans 'Refresh' %}">🔄</button>
        </div>
        <div class="teachers-list" id="teachersList">
            <div class="loading">
                <span>{% trans "Loading" %}</span>
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="messages-container" id="messagesContainer">
            <div class="empty-state">
                <div class="empty-icon">👥</div>
                <div>{% trans "Select a teacher to view conversations" %}</div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = '/api';
    let state = {
        conversations: [],
        selectedTeacherId: null,
        selectedTeacherMessages: [],
        selectedMessage: null
    };

    document.addEventListener('DOMContentLoaded', init);

    async function init() {
        await loadConversations();
        document.getElementById('refreshBtn').addEventListener('click', loadConversations);
    }

    async function loadConversations() {
        try {
            const teachersList = document.getElementById('teachersList');
            teachersList.innerHTML = '<div class="loading"><span>{% trans "Loading" %}</span><div class="spinner"></div></div>';

            const response = await fetch(`${API_BASE}/teacher-conversations/`, {
                headers: getAuthHeaders()
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.json();
            state.conversations = data.results || [];

            renderTeachers();

        } catch (error) {
            console.error('Error loading conversations:', error);
            showToast('Error loading conversations', 'error');
        }
    }

    function renderTeachers() {
        const teachersList = document.getElementById('teachersList');

        if (state.conversations.length === 0) {
            teachersList.innerHTML = '<div class="empty-state" style="height: auto; padding: 20px;"><div class="empty-icon">📭</div><div>No conversations</div></div>';
            return;
        }

        teachersList.innerHTML = state.conversations
            .sort((a, b) => new Date(b.last_message_date) - new Date(a.last_message_date))
            .map(conv => `
                <div class="teacher-item ${state.selectedTeacherId === conv.teacher_id ? 'active' : ''}" 
                     data-teacher-id="${conv.teacher_id}">
                    <div class="teacher-info">
                        <div class="teacher-name">${escapeHtml(conv.teacher_name)}</div>
                        <div class="teacher-meta">
                            ${conv.message_count} {% trans "messages" %} • 
                            ${formatDate(conv.last_message_date)}
                        </div>
                    </div>
                    ${conv.unread_count > 0 ? `<div class="unread-badge">${conv.unread_count}</div>` : ''}
                </div>
            `).join('');

        document.querySelectorAll('.teacher-item').forEach(item => {
            item.addEventListener('click', () => {
                const teacherId = parseInt(item.dataset.teacherId);
                selectTeacher(teacherId);
            });
        });
    }

    async function selectTeacher(teacherId) {
        state.selectedTeacherId = teacherId;
        
        try {
            const response = await fetch(`${API_BASE}/teacher-conversations/${teacherId}/`, {
                headers: getAuthHeaders()
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.json();
            state.selectedTeacherMessages = data.results || [];
            const teacherName = data.teacher_name || 'Unknown';

            renderTeachers();
            renderMessages(teacherName);

        } catch (error) {
            console.error('Error loading messages:', error);
            showToast('Error loading messages', 'error');
        }
    }

    function renderMessages(teacherName) {
        const messagesContainer = document.getElementById('messagesContainer');

        if (state.selectedTeacherMessages.length === 0) {
            messagesContainer.innerHTML = `
                <div class="messages-container">
                    <div class="messages-header">
                        <h2 class="messages-title">${escapeHtml(teacherName)}</h2>
                        <p class="messages-subtitle">No messages yet</p>
                    </div>
                    <div class="empty-state">
                        <div class="empty-icon">💬</div>
                        <div>No messages in this conversation</div>
                    </div>
                </div>
            `;
            return;
        }

        const messagesHtml = state.selectedTeacherMessages.map((msg, index) => `
            <div class="message-row ${msg.status === 'sent' ? 'unread' : ''} ${state.selectedMessage?.id === msg.id ? 'active' : ''}"
                 data-message-id="${msg.id}">
                <div class="msg-sender">
                    ${msg.sender_name ? escapeHtml(msg.sender_name) : 'Unknown'}
                    ${msg.status === 'sent' ? '<span class="status-unread">• Unread</span>' : ''}
                </div>
                <div class="msg-text">${msg.message_text ? escapeHtml(msg.message_text.substring(0, 80)) : 'No text'}</div>
                <div class="msg-time">${formatDateTime(msg.created_at)}</div>
            </div>
        `).join('');

        messagesContainer.innerHTML = `
            <div class="messages-container">
                <div class="messages-header">
                    <h2 class="messages-title">${escapeHtml(teacherName)}</h2>
                    <p class="messages-subtitle">${state.selectedTeacherMessages.length} messages</p>
                </div>
                <div class="messages-list">
                    ${messagesHtml}
                </div>
            </div>
        `;

        document.querySelectorAll('.message-row').forEach(row => {
            row.addEventListener('click', (e) => {
                const msgId = parseInt(row.dataset.messageId);
                const msg = state.selectedTeacherMessages.find(m => m.id === msgId);
                if (msg) {
                    selectMessage(msg);
                }
            });
        });
    }

    function selectMessage(message) {
        state.selectedMessage = message;
        renderMessages(state.conversations.find(c => c.teacher_id === state.selectedTeacherId)?.teacher_name || 'Unknown');
    }

    function getAuthHeaders() {
        return {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken'),
        };
    }

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    function formatDate(dateString) {
        const date = new Date(dateString);
        const today = new Date();
        if (date.toDateString() === today.toDateString()) {
            return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }
        return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function formatDateTime(dateString) {
        const date = new Date(dateString);
        return date.toLocaleString('en-US', { 
            month: 'short', 
            day: 'numeric', 
            hour: '2-digit', 
            minute: '2-digit' 
        });
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = message;
        document.body.appendChild(toast);

        setTimeout(() => {
            toast.style.animation = 'slideIn 0.3s ease reverse';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }
</script>
{% endblock %}
