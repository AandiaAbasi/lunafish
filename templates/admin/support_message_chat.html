{% extends "admin/base_site.html" %}
{% load i18n admin_urls %}

{% block title %}مدیریت پیام‌های پشتیبانی - {{ block.super }}{% endblock %}

{% block content %}
<style>
    :root {
        --white: #ffffff;
        --light-gray: #f5f5f5;
        --gray: #e0e0e0;
        --dark-gray: #666666;
        --darker-gray: #333333;
        --light-blue: #ecf0f6;
        --blue: #3b82f6;
        --dark-blue: #1e40af;
        --success: #10b981;
        --warning: #f59e0b;
        --error: #ef4444;
    }

    body {
        direction: rtl;
    }

    #content {
        padding: 0;
    }

    .main-container {
        display: grid;
        grid-template-columns: 350px 1fr;
        gap: 0;
        height: calc(100vh - 60px);
    }

    @media (max-width: 768px) {
        .main-container {
            grid-template-columns: 1fr;
            height: auto;
        }
    }

    /* Sidebar - Teachers List */
    .sidebar {
        background-color: var(--white);
        border-left: 1px solid var(--gray);
        padding: 0;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
    }

    .sidebar-header {
        padding: 20px;
        border-bottom: 1px solid var(--gray);
        background-color: var(--light-gray);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .sidebar-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--darker-gray);
        margin: 0;
    }

    .refresh-btn {
        width: 36px;
        height: 36px;
        border: 1px solid var(--gray);
        background-color: var(--white);
        color: var(--dark-gray);
        border-radius: 6px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
    }

    .refresh-btn:hover {
        background-color: var(--light-blue);
        color: var(--blue);
    }

    .teachers-list {
        flex: 1;
        overflow-y: auto;
    }

    .teacher-item {
        padding: 16px 20px;
        border-bottom: 1px solid var(--gray);
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
    }

    .teacher-item:hover {
        background-color: var(--light-gray);
    }

    .teacher-item.active {
        background-color: var(--light-blue);
        border-left: 4px solid var(--blue);
        padding-left: 16px;
    }

    .teacher-info {
        flex: 1;
    }

    .teacher-name {
        font-weight: 600;
        color: var(--darker-gray);
        margin-bottom: 4px;
        font-size: 14px;
    }

    .teacher-meta {
        font-size: 12px;
        color: var(--dark-gray);
        opacity: 0.7;
    }

    .unread-badge {
        background-color: var(--error);
        color: var(--white);
        border-radius: 50%;
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 600;
        min-width: 24px;
    }

    .unread-badge.hidden {
        display: none;
    }

    /* Main Content */
    .main-content {
        display: flex;
        flex-direction: column;
        background-color: var(--light-gray);
        height: 100%;
    }

    .messages-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        background-color: var(--white);
    }

    .messages-header {
        padding: 20px;
        border-bottom: 1px solid var(--gray);
        background-color: var(--light-gray);
    }

    .messages-title {
        font-size: 16px;
        font-weight: 600;
        color: var(--darker-gray);
        margin: 0 0 8px 0;
    }

    .messages-subtitle {
        font-size: 13px;
        color: var(--dark-gray);
        margin: 0;
    }

    .messages-list {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
    }

    .message-row {
        padding: 12px;
        margin-bottom: 8px;
        background-color: var(--light-gray);
        border-radius: 6px;
        border-left: 4px solid transparent;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .message-row:hover {
        background-color: #f0f0f0;
    }

    .message-row.active {
        background-color: var(--light-blue);
        border-left-color: var(--blue);
    }

    .message-row.unread {
        border-left-color: var(--error);
    }

    .msg-sender {
        font-weight: 600;
        color: var(--darker-gray);
        font-size: 13px;
        margin-bottom: 4px;
    }

    .msg-text {
        font-size: 12px;
        color: var(--dark-gray);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 4px;
    }

    .msg-time {
        font-size: 11px;
        color: var(--dark-gray);
        opacity: 0.6;
    }

    .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--dark-gray);
        text-align: center;
    }

    .empty-icon {
        font-size: 48px;
        margin-bottom: 16px;
        opacity: 0.3;
    }

    /* Loading State */
    .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--dark-gray);
    }

    .spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid var(--gray);
        border-top-color: var(--blue);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-left: 10px;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* Toast */
    .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 16px;
        border-radius: 6px;
        color: var(--white);
        font-size: 14px;
        z-index: 3000;
        animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
        from {
            transform: translateX(100%);
            opacity: 0;
        }
        to {
            transform: translateX(0);
            opacity: 1;
        }
    }

    .toast-success {
        background-color: var(--success);
    }

    .toast-error {
        background-color: var(--error);
    }

    .message-bubble {
        padding: 12px 16px;
        margin-bottom: 12px;
        border-radius: 8px;
        max-width: 70%;
        word-wrap: break-word;
    }

    .message-bubble.incoming {
        background-color: var(--light-gray);
        color: var(--darker-gray);
        margin-right: auto;
        border-left: 4px solid var(--blue);
    }

    .message-bubble.outgoing {
        background-color: var(--blue);
        color: var(--white);
        margin-left: auto;
    }

    .message-time {
        font-size: 11px;
        opacity: 0.7;
        margin-top: 4px;
    }

    .message-sender {
        font-size: 11px;
        font-weight: 600;
        margin-bottom: 4px;
        opacity: 0.8;
    }

    .reply-box {
        padding: 16px;
        border-top: 1px solid var(--gray);
        background-color: var(--light-gray);
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .reply-input-wrapper {
        display: flex;
        gap: 10px;
        align-items: flex-end;
    }

    .reply-textarea {
        flex: 1;
        padding: 10px 12px;
        border: 1px solid var(--gray);
        border-radius: 6px;
        font-size: 13px;
        font-family: inherit;
        color: var(--darker-gray);
        resize: none;
        max-height: 100px;
        min-height: 40px;
    }

    .reply-textarea:focus {
        outline: none;
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .attach-btn {
        width: 40px;
        height: 40px;
        border: 1px solid var(--gray);
        background-color: var(--white);
        color: var(--dark-gray);
        border-radius: 6px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        transition: all 0.2s ease;
    }

    .attach-btn:hover {
        background-color: var(--light-blue);
        border-color: var(--blue);
        color: var(--blue);
    }

    .send-btn {
        width: 40px;
        height: 40px;
        border: none;
        background-color: var(--blue);
        color: var(--white);
        border-radius: 6px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        transition: all 0.2s ease;
    }

    .send-btn:hover {
        background-color: var(--dark-blue);
    }

    .send-btn:disabled {
        background-color: var(--gray);
        cursor: not-allowed;
    }

    .file-input {
        display: none;
    }

    .attached-files {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 8px 0;
    }

    .attached-file {
        background-color: var(--white);
        padding: 6px 10px;
        border-radius: 4px;
        font-size: 12px;
        color: var(--dark-gray);
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid var(--gray);
    }

    .attached-file-remove {
        cursor: pointer;
        color: var(--error);
        font-weight: 600;
    }
</style>

<div class="main-container">
    <!-- Sidebar - Teachers List -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2 class="sidebar-title">{% trans "Teachers" %}</h2>
            <button class="refresh-btn" id="refreshBtn" title="{% trans 'Refresh' %}">🔄</button>
        </div>
        <div class="teachers-list" id="teachersList">
            <div class="loading">
                <span>{% trans "Loading" %}</span>
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="messages-container" id="messagesContainer">
            <div class="empty-state">
                <div class="empty-icon">👥</div>
                <div>{% trans "Select a teacher to view conversations" %}</div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = '/api';
    let state = {
        conversations: [],
        selectedTeacherId: null,
        selectedTeacherMessages: [],
        selectedMessage: null
    };

    document.addEventListener('DOMContentLoaded', init);

    async function init() {
        await loadConversations();
        document.getElementById('refreshBtn').addEventListener('click', loadConversations);
    }

    async function loadConversations() {
        try {
            const teachersList = document.getElementById('teachersList');
            teachersList.innerHTML = '<div class="loading"><span>{% trans "Loading" %}</span><div class="spinner"></div></div>';

            const response = await fetch(`${API_BASE}/teacher-conversations/`, {
                headers: getAuthHeaders()
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.json();
            state.conversations = data.results || [];

            renderTeachers();

        } catch (error) {
            console.error('Error loading conversations:', error);
            showToast('Error loading conversations', 'error');
        }
    }

    function renderTeachers() {
        const teachersList = document.getElementById('teachersList');

        if (state.conversations.length === 0) {
            teachersList.innerHTML = '<div class="empty-state" style="height: auto; padding: 20px;"><div class="empty-icon">📭</div><div>No conversations</div></div>';
            return;
        }

        teachersList.innerHTML = state.conversations
            .sort((a, b) => new Date(b.last_message_date) - new Date(a.last_message_date))
            .map(conv => `
                <div class="teacher-item ${state.selectedTeacherId === conv.teacher_id ? 'active' : ''}" 
                     data-teacher-id="${conv.teacher_id}">
                    <div class="teacher-info">
                        <div class="teacher-name">${escapeHtml(conv.teacher_name)}</div>
                        <div class="teacher-meta">
                            ${conv.message_count} {% trans "messages" %} • 
                            ${formatDate(conv.last_message_date)}
                        </div>
                    </div>
                    ${conv.unread_count > 0 ? `<div class="unread-badge">${conv.unread_count}</div>` : ''}
                </div>
            `).join('');

        document.querySelectorAll('.teacher-item').forEach(item => {
            item.addEventListener('click', () => {
                const teacherId = parseInt(item.dataset.teacherId);
                selectTeacher(teacherId);
            });
        });
    }

    async function selectTeacher(teacherId) {
        state.selectedTeacherId = teacherId;
        
        try {
            const response = await fetch(`${API_BASE}/teacher-conversations/${teacherId}/`, {
                headers: getAuthHeaders()
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.json();
            state.selectedTeacherMessages = data.results || [];
            const teacherName = data.teacher_name || 'Unknown';

            renderTeachers();
            renderChatView(teacherName);

        } catch (error) {
            console.error('Error loading messages:', error);
            showToast('Error loading messages', 'error');
        }
    }

    function renderMessages(teacherName) {
        const messagesContainer = document.getElementById('messagesContainer');

        if (state.selectedTeacherMessages.length === 0) {
            messagesContainer.innerHTML = `
                <div class="messages-container">
                    <div class="messages-header">
                        <h2 class="messages-title">${escapeHtml(teacherName)}</h2>
                        <p class="messages-subtitle">No messages yet</p>
                    </div>
                    <div class="empty-state">
                        <div class="empty-icon">💬</div>
                        <div>No messages in this conversation</div>
                    </div>
                </div>
            `;
            return;
        }

        const messagesHtml = state.selectedTeacherMessages.map((msg, index) => `
            <div class="message-row ${msg.status === 'sent' ? 'unread' : ''} ${state.selectedMessage?.id === msg.id ? 'active' : ''}"
                 data-message-id="${msg.id}">
                <div class="msg-sender">
                    ${msg.sender_name ? escapeHtml(msg.sender_name) : 'Unknown'}
                    ${msg.status === 'sent' ? '<span class="status-unread">• Unread</span>' : ''}
                </div>
                <div class="msg-text">${msg.message_text ? escapeHtml(msg.message_text.substring(0, 80)) : 'No text'}</div>
                <div class="msg-time">${formatDateTime(msg.created_at)}</div>
            </div>
        `).join('');

        messagesContainer.innerHTML = `
            <div class="messages-container">
                <div class="messages-header">
                    <h2 class="messages-title">${escapeHtml(teacherName)}</h2>
                    <p class="messages-subtitle">${state.selectedTeacherMessages.length} messages</p>
                </div>
                <div class="messages-list">
                    ${messagesHtml}
                </div>
            </div>
        `;

        document.querySelectorAll('.message-row').forEach(row => {
            row.addEventListener('click', (e) => {
                const msgId = parseInt(row.dataset.messageId);
                const msg = state.selectedTeacherMessages.find(m => m.id === msgId);
                if (msg) {
                    selectMessage(msg);
                }
            });
        });
    }

    function selectMessage(message) {
        state.selectedMessage = message;
        renderChatView(state.conversations.find(c => c.teacher_id === state.selectedTeacherId)?.teacher_name || 'Unknown');
    }

    function renderChatView(teacherName) {
        const messagesContainer = document.getElementById('messagesContainer');
        const selectedTeacher = state.conversations.find(c => c.teacher_id === state.selectedTeacherId);

        if (state.selectedTeacherMessages.length === 0) {
            messagesContainer.innerHTML = `
                <div class="messages-container">
                    <div class="messages-header">
                        <h2 class="messages-title">${escapeHtml(teacherName)}</h2>
                    </div>
                    <div class="empty-state">
                        <div class="empty-icon">💬</div>
                        <div>No messages in this conversation</div>
                    </div>
                </div>
            `;
            return;
        }

        // Create chat messages view
        const messagesHtml = state.selectedTeacherMessages.map((msg, index) => {
            const isAdminMessage = msg.sender_id === {{ user.id }};
            const attachmentsHtml = msg.attachments && msg.attachments.length > 0
                ? `
                    <div style="margin-top: 8px; display: flex; flex-direction: column; gap: 6px;">
                        ${msg.attachments.map(att => `
                            <a href="${att.file}" target="_blank" style="display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; background-color: rgba(255,255,255,0.2); border-radius: 4px; text-decoration: none; color: inherit; font-size: 11px; width: fit-content;">
                                <span>📎</span>
                                <span>${escapeHtml((att.name || 'File').substring(0, 30))}</span>
                            </a>
                        `).join('')}
                    </div>
                `
                : '';

            return `
                <div style="display: flex; margin-bottom: 16px; ${isAdminMessage ? 'justify-content: flex-end;' : 'justify-content: flex-start;'}">
                    <div class="message-bubble ${isAdminMessage ? 'outgoing' : 'incoming'}">
                        ${!isAdminMessage ? `<div class="message-sender">${escapeHtml(msg.sender_name || 'Unknown')}</div>` : ''}
                        <div>${escapeHtml(msg.message_text || 'No text')}</div>
                        ${attachmentsHtml}
                        <div class="message-time">${formatDateTime(msg.created_at)}</div>
                    </div>
                </div>
            `;
        }).join('');

        messagesContainer.innerHTML = `
            <div class="messages-container" style="display: flex; flex-direction: column; height: 100%;">
                <div class="messages-header">
                    <h2 class="messages-title">${escapeHtml(teacherName)}</h2>
                    <p class="messages-subtitle">${state.selectedTeacherMessages.length} messages</p>
                </div>
                <div class="messages-list" style="flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column;">
                    ${messagesHtml}
                    <div id="messagesEnd"></div>
                </div>
                <div class="reply-box">
                    <div class="attached-files" id="attachedFilesList"></div>
                    <div class="reply-input-wrapper">
                        <input type="file" id="replyFileInput" class="file-input" multiple>
                        <button class="attach-btn" id="attachBtn" title="Attach files">📎</button>
                        <textarea id="replyText" class="reply-textarea" placeholder="Type your reply..." rows="1"></textarea>
                        <button class="send-btn" id="sendReplyBtn" title="Send">✈️</button>
                    </div>
                </div>
            </div>
        `;

        // Auto-scroll to bottom
        setTimeout(() => {
            const messagesEnd = document.getElementById('messagesEnd');
            messagesEnd?.scrollIntoView({ behavior: 'smooth' });
        }, 100);

        // Setup event listeners
        const replyTextarea = document.getElementById('replyText');
        const attachBtn = document.getElementById('attachBtn');
        const fileInput = document.getElementById('replyFileInput');
        const sendBtn = document.getElementById('sendReplyBtn');

        // Auto-resize textarea
        replyTextarea.addEventListener('input', () => {
            replyTextarea.style.height = 'auto';
            replyTextarea.style.height = Math.min(replyTextarea.scrollHeight, 100) + 'px';
        });

        attachBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', updateAttachedFiles);
        sendBtn.addEventListener('click', sendReply);

        // Send on Enter (but allow Shift+Enter for newline)
        replyTextarea.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendReply();
            }
        });
    }

    function updateAttachedFiles() {
        const fileInput = document.getElementById('replyFileInput');
        const filesList = document.getElementById('attachedFilesList');
        filesList.innerHTML = '';

        Array.from(fileInput.files).forEach((file, index) => {
            const fileDiv = document.createElement('div');
            fileDiv.className = 'attached-file';
            fileDiv.innerHTML = `
                <span>📄 ${escapeHtml(file.name)}</span>
                <span class="attached-file-remove" data-index="${index}">✕</span>
            `;
            filesList.appendChild(fileDiv);

            fileDiv.querySelector('.attached-file-remove').addEventListener('click', () => {
                const dataTransfer = new DataTransfer();
                Array.from(fileInput.files).forEach((f, i) => {
                    if (i !== index) dataTransfer.items.add(f);
                });
                fileInput.files = dataTransfer.files;
                updateAttachedFiles();
            });
        });
    }

    async function sendReply() {
        if (!state.selectedTeacherId) {
            showToast('Please select a teacher first', 'error');
            return;
        }

        const replyText = document.getElementById('replyText').value.trim();
        const fileInput = document.getElementById('replyFileInput');

        if (!replyText && fileInput.files.length === 0) {
            showToast('Please add text or files', 'error');
            return;
        }

        try {
            const sendBtn = document.getElementById('sendReplyBtn');
            sendBtn.disabled = true;

            const formData = new FormData();
            formData.append('teacher_id', state.selectedTeacherId);
            formData.append('sender_id', {{ user.id }});
            if (replyText) formData.append('message_text', replyText);

            for (const file of fileInput.files) {
                formData.append('attachments', file);
            }

            const response = await fetch(`${API_BASE}/support-messages/`, {
                method: 'POST',
                headers: {
                    'X-CSRFToken': getCookie('csrftoken'),
                },
                body: formData
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || `HTTP ${response.status}`);
            }

            showToast('Reply sent successfully!', 'success');
            document.getElementById('replyText').value = '';
            fileInput.value = '';
            updateAttachedFiles();
            
            // Reload messages
            await selectTeacher(state.selectedTeacherId);

        } catch (error) {
            console.error('Error:', error);
            showToast('Error sending reply: ' + error.message, 'error');
        } finally {
            document.getElementById('sendReplyBtn').disabled = false;
        }
    }

    function getAuthHeaders() {
        return {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken'),
        };
    }

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    // تبدیل تاریخ میلادی به شمسی
    function toJalali(date) {
        const gy = date.getFullYear();
        const gm = date.getMonth() + 1;
        const gd = date.getDate();
        
        let g_d_n = 365 * gy + Math.floor((gy + 3) / 4) - Math.floor((gy + 99) / 100) + Math.floor((gy + 399) / 400);
        for (let i = 0; i < gm; ++i) {
            g_d_n += [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31][i];
        }
        if (gm > 2) g_d_n += Math.floor(gy / 4) - Math.floor(gy / 100) + Math.floor(gy / 400) - Math.floor((gy - 1) / 4) + Math.floor((gy - 1) / 100) - Math.floor((gy - 1) / 400);
        g_d_n += gd;
        
        let j_d_n = g_d_n - 79;
        
        let j_np = Math.floor(j_d_n / 12053);
        j_d_n = j_d_n % 12053;
        
        let jy = 979 + 33 * j_np + 4 * Math.floor(j_d_n / 1461);
        j_d_n %= 1461;
        
        if (j_d_n >= 366) {
            jy += Math.floor((j_d_n - 1) / 365);
            j_d_n = (j_d_n - 1) % 365;
        }
        
        let jm = 1;
        let jd = j_d_n + 1;
        
        if (jd <= 186) {
            jm = 1 + Math.floor((jd - 1) / 31);
            jd = 1 + (jd - 1) % 31;
        } else {
            jm = 7 + Math.floor((jd - 187) / 30);
            jd = 1 + (jd - 187) % 30;
        }
        
        return { year: jy, month: jm, day: jd };
    }

    function formatDate(dateString) {
        const date = new Date(dateString);
        const today = new Date();
        const jalali = toJalali(date);
        
        if (date.toDateString() === today.toDateString()) {
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${hours}:${minutes}`;
        }
        const month = String(jalali.month).padStart(2, '0');
        const day = String(jalali.day).padStart(2, '0');
        return `${jalali.year}/${month}/${day}`;
    }

    function formatDateTime(dateString) {
        const date = new Date(dateString);
        const jalali = toJalali(date);
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        const month = String(jalali.month).padStart(2, '0');
        const day = String(jalali.day).padStart(2, '0');
        return `${jalali.year}/${month}/${day} ${hours}:${minutes}`
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = message;
        document.body.appendChild(toast);

        setTimeout(() => {
            toast.style.animation = 'slideIn 0.3s ease reverse';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }
</script>
{% endblock %}
