################################################################################
# Lunafish Production Stack — fofofish.app
################################################################################

services:

  nginx:
    image: nginx:1.27-alpine
    container_name: lunafish-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/app/staticfiles:ro
    depends_on:
      - centrifugo
      - mediasoup
      - django
    networks:
      - lunafish

  centrifugo:
    image: centrifugo/centrifugo:v5
    container_name: lunafish-centrifugo
    restart: unless-stopped
    command: centrifugo -c /centrifugo/config.json
    volumes:
      - ./centrifugo/config.json:/centrifugo/config.json:ro
    environment:
      CENTRIFUGO_TOKEN_HMAC_SECRET_KEY: ${CENTRIFUGO_TOKEN_SECRET}
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY}
      CENTRIFUGO_ADMIN_PASSWORD: ${CENTRIFUGO_ADMIN_PASSWORD}
      CENTRIFUGO_ADMIN_SECRET: ${CENTRIFUGO_ADMIN_SECRET}
      CENTRIFUGO_REDIS_ADDRESS: "redis:6379"
      CENTRIFUGO_REDIS_PASSWORD: ${REDIS_PASSWORD}
      CENTRIFUGO_REDIS_DB: "2"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - lunafish

  mediasoup:
    build:
      context: ../lunafish-rtc
      dockerfile: Dockerfile
    container_name: lunafish-mediasoup
    restart: unless-stopped
    environment:
      HOST: "0.0.0.0"
      PORT: "3001"
      PUBLIC_IP: ${PUBLIC_IP}
      RTC_JWT_SECRET: ${RTC_JWT_SECRET}
      RTC_WS_PATH: "/rtc/ws"
      RTC_MIN_PORT: "40000"
      RTC_MAX_PORT: "40100"
      RTC_STUN_URLS: "stun:stun.l.google.com:19302"
      RTC_TURN_URLS: ${RTC_TURN_URLS:-}
      RTC_TURN_USERNAME: ${RTC_TURN_USERNAME:-}
      RTC_TURN_CREDENTIAL: ${RTC_TURN_CREDENTIAL:-}
      MEDIASOUP_LOG_LEVEL: "warn"
      DJANGO_INTERNAL_CALLBACK_URL: "http://django:8000/api/internal/rtc-events/"
      INTERNAL_CALLBACK_SECRET: ${INTERNAL_CALLBACK_SECRET}
    ports:
      - "40000-40100:40000-40100/udp"
      - "40000-40100:40000-40100/tcp"
    networks:
      - lunafish

  django:
    build:
      context: ..
      dockerfile: deployment/django/Dockerfile
    container_name: lunafish-django
    env_file:
      - .env
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: "fofofish.settings"
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "False"
      DB_ENGINE: "django.db.backends.postgresql"
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: "postgres"
      DB_PORT: "5432"
      CENTRIFUGO_API_URL: "http://centrifugo:8000/api"
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY}
      CENTRIFUGO_TOKEN_SECRET: ${CENTRIFUGO_TOKEN_SECRET}
      CENTRIFUGO_WS_URL: "wss://fofofish.app/realtime/connection/websocket"
      RTC_JWT_SECRET: ${RTC_JWT_SECRET}
      RTC_WS_URL: "wss://fofofish.app/rtc/ws"
      INTERNAL_CALLBACK_SECRET: ${INTERNAL_CALLBACK_SECRET}
    volumes:
      - static_files:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lunafish

  postgres:
    image: postgres:16-alpine
    container_name: lunafish-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lunafish
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: lunafish-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - lunafish
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  static_files:

networks:
  lunafish:
    driver: bridge
